name: ci

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

# Read-only by default; release.yml elevates separately on tag pushes.
permissions:
  contents: read

# Cancel an in-flight run when a new commit lands on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: gate (${{ matrix.os }} · node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      # Show every failing cell — don't mask one OS behind another.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install (deterministic)
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      # Build BEFORE test: several tests spawn the compiled CLI
      # (dist/cli/cli.js) as a subprocess (tests/doctorNonNode.test.ts,
      # tests/cli.test.ts). Running the build first guarantees a complete,
      # consistent dist/ exists before any test spawns it — otherwise those
      # tests race against the dist/ left by the `prepare` step and
      # intermittently import a mid-write module ("does not provide an export
      # named …"), an observed flake on windows/macOS cells.
      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  install-smoke:
    name: install smoke (pack → fresh project)
    runs-on: ubuntu-latest
    needs: gate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install + build
        run: |
          npm ci
          npm run build

      - name: Pack
        run: npm pack --pack-destination "$RUNNER_TEMP"

      - name: Install into a fresh project
        run: |
          set -e
          mkdir -p "$RUNNER_TEMP/consumer"
          cd "$RUNNER_TEMP/consumer"
          npm init -y >/dev/null
          npm install "$RUNNER_TEMP"/kairo-mcp-*.tgz

      - name: Smoke — dist files present
        run: |
          set -e
          cd "$RUNNER_TEMP/consumer"
          test -f node_modules/kairo-mcp/dist/index.js
          test -f node_modules/kairo-mcp/dist/cli/cli.js

      - name: Smoke — kairo --version exits 0
        run: |
          set -e
          cd "$RUNNER_TEMP/consumer"
          ./node_modules/.bin/kairo --version

      - name: Smoke — kairo doctor --json is valid JSON with stable shape
        run: |
          set -e
          cd "$RUNNER_TEMP/consumer"
          ./node_modules/.bin/kairo doctor --json -C . > doctor.json || true
          node -e "
            const j = require('$RUNNER_TEMP/consumer/doctor.json');
            if (typeof j.ok !== 'boolean' || !Array.isArray(j.checks)) {
              console.error('doctor JSON shape regressed:', JSON.stringify(j).slice(0, 200));
              process.exit(1);
            }
            console.log('doctor JSON shape: ok=' + j.ok + ', checks=' + j.checks.length);
          "

      - name: Smoke — kairo init writes .mcp.json + .gitignore idempotently
        run: |
          set -e
          cd "$RUNNER_TEMP/consumer"
          ./node_modules/.bin/kairo init --json > init.json
          node -e "
            const j = require('$RUNNER_TEMP/consumer/init.json');
            if (j.mcpJson !== 'written' || (j.gitignore !== 'appended' && j.gitignore !== 'skipped')) {
              console.error('init JSON shape regressed:', JSON.stringify(j));
              process.exit(1);
            }
            console.log('init JSON shape: mcpJson=' + j.mcpJson + ' gitignore=' + j.gitignore + ' detectedHost=' + j.detectedHost);
          "
          test -f .mcp.json
          node -e "
            const m = require('$RUNNER_TEMP/consumer/.mcp.json');
            if (!m.mcpServers || !m.mcpServers.kairo) {
              console.error('.mcp.json missing kairo entry:', JSON.stringify(m));
              process.exit(1);
            }
            console.log('.mcp.json wires:', Object.keys(m.mcpServers).join(','));
          "
          # Second run must be idempotent (no overwrite without --force).
          ./node_modules/.bin/kairo init --json > init2.json
          node -e "
            const j = require('$RUNNER_TEMP/consumer/init2.json');
            if (j.mcpJson !== 'skipped') {
              console.error('init is NOT idempotent:', JSON.stringify(j));
              process.exit(1);
            }
            console.log('init is idempotent (second run skipped)');
          "
